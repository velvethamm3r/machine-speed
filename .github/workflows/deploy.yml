name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the site files
        uses: actions/checkout@v4

      - name: Build the site
        run: python3 build.py

      - name: Save today's archive snapshot into the repo
        run: |
          git config user.name "machine-speed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add archive/
          if ! git diff --cached --quiet; then
            git commit -m "Save archive snapshot [skip ci]"
            git push
          fi

      - name: Upload the built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
